playground:

  - name:     sshd
    type:     null
    schedule: start
    in:
      port: 0

  - name:     idx
    type:     null
    schedule: null
    in:
      hosts:
        - {host: mariadb.0, type: mariadb,  username: root,     password: mariadb}
        - {host: pgsql.0,   type: postgres, username: postgres, password: pgsql}
#       - {host: 0.0.0.0,   type: file, path: /}
      exts:

  - name:     dataset
    type:     null
    schedule: null
    in:
      keys:
        - //0.0.0.0/${HOME}/src/0.playground/idx.db/idx
