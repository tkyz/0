playground:

  sshd:
    schedule: start
    port: 0

  idx:
    schedule: start
    hosts:
      - {host: mariadb.0, type: mariadb,  username: root,     password: mariadb}
      - {host: pgsql.0,   type: postgres, username: postgres, password: pgsql}
#     - {host: null,      type: file}
    exts:
      - c
      - cpp
      - cs
      - h
      - rs
      - go
      - java
      - php
      - pl
      - py
      - js
      - sh
      - bat
      - bas
      - frm
      - cob
      - sql
      - ddl
      - Makefile
      - Dockerfile
      - Vagrantfile
      - htm
      - html
      - css
      - cnf
      - conf
      - config
      - ini
      - properties
      - json
      - yml
      - yaml
      - xml
      - tsv
      - csv
      - avro
      - avsc
      - key
      - pub
      - crt
      - csr
      - pem
      - id_rsa
      - jar
      - war
      - ear
      - tar
      - bz2
      - gz
      - zip
      - lzh
      - mdb
      - accdb
      - xls
      - xlsx
      - pdf
      - txt
      - png
      - gif
      - jpg
      - jpeg
      - bmp
      - mp4
      - flv
      - avi

  dataset:
    schedule: start
    keys:
      - //0.0.0.0/${HOME}/src/0.playground/idx.db/idx
