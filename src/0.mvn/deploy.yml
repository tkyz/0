---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: "0"
  name: mvn
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mvn
  template:
    metadata:
      labels:
        app: mvn
    spec:
      volumes:
        - {name: data-volume, hostPath: {path: /mnt/0.mvn, type: Directory}}
      containers:
        - name: mvn
          image: container.0/0.mvn:${context}
          imagePullPolicy: IfNotPresent
          ports:
            - {protocol: TCP, containerPort: 8080}
          volumeMounts:
            - {name: data-volume, subPath: data,         mountPath: /opt/org.apache.archiva/data}
            - {name: data-volume, subPath: repositories, mountPath: /opt/org.apache.archiva/repositories}

---
apiVersion: v1
kind: Service
metadata:
  namespace: "0"
  name: mvn
spec:
  type: LoadBalancer
  selector:
    app: mvn
  ports:
    - {protocol: TCP, port: 8080}

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: "0"
  name: mvn
spec:
  rules:
    - host: mvn.0
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: mvn
                port:
                  number: 8080
    - host: mvn.${tld}
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: mvn
                port:
                  number: 8080
