---
apiVersion: v1
kind: ConfigMap
metadata:
  namespace: ${namespace}
  name: dns
data:
  Corefile: |
    .:53 {
      errors
      ready
      health
      hosts {
        ${external_ip}       dns.${domain}
        ${external_ip}       ntp.${domain}
        ${external_ip}       git.${domain}
        ${external_ip} container.${domain}
        ${external_ip}       apt.${domain}
        ${external_ip}       mvn.${domain}
        ${external_ip}     pgsql.${domain}
        ${external_ip}     mysql.${domain}
        ${external_ip}   mariadb.${domain}
        ${external_ip}     redis.${domain}
        ${external_ip}     setup.${domain}
        ${external_ip}       doc.${domain}
        ${external_ip}       btc.${domain}
        ${external_ip}       eth.${domain}
        fallthrough
      }
      forward . ${resolve}
      loop
      reload
      loadbalance
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: ${namespace}
  name: dns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dns
  template:
    metadata:
      labels:
        app: dns
    spec:
      volumes:
        - name: config-volume
          configMap:
            name: dns
      containers:
        - name: dns
          image: coredns/coredns:latest
          imagePullPolicy: IfNotPresent
          ports:
            - {protocol: UDP, containerPort: 53}
          volumeMounts:
            - {name: config-volume, mountPath: /etc/coredns, readOnly: true}
          args: [-conf, /etc/coredns/Corefile]

---
apiVersion: v1
kind: Service
metadata:
  namespace: ${namespace}
  name: dns
spec:
  type: NodePort
  selector:
    app: dns
  ports:
    - {protocol: UDP, port: 53, nodePort: 30053}
