---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: ${namespace}
  name: minecraft
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minecraft
  template:
    metadata:
      labels:
        app: minecraft
    spec:
#     volumes:
#       - {name: data-volume, hostPath: {path: /root/lib/0.minecraft, type: Directory}}
      containers:
        - name: minecraft
          image: container.${domain}/net.minecraft:${tag}
          imagePullPolicy: IfNotPresent
          ports:
            - {protocol: TCP, containerPort: 25565}
#         volumeMounts:
#           - {name: data-volume, mountPath: /var/lib/postgresql/data}

---
apiVersion: v1
kind: Service
metadata:
  namespace: ${namespace}
  name: minecraft
spec:
  type: NodePort
  selector:
    app: minecraft
  ports:
    - {protocol: TCP, port: 25565, nodePort: 35565}
