---
apiVersion: v1
kind: ConfigMap
metadata:
  namespace: "0"
  name: wiki
data:
  default.conf: |
    server {
      listen 80;
    # listen 443 ssl;
      server_name _;
      root /usr/share/nginx/html;
      index doku.php index.php;
      location ~ /(data|conf|bin|inc|vendor)/ {
        deny all;
      }
      location / {
        try_files $uri $uri/ @dokuwiki;
      }
      location @dokuwiki {
        rewrite ^/_media/(.*)          /lib/exe/fetch.php?media=$1  last;
        rewrite ^/_detail/(.*)         /lib/exe/detail.php?media=$1 last;
        rewrite ^/_export/([^/]+)/(.*) /doku.php?do=export_$1&id=$2 last;
        rewrite ^/(?!lib/)(.*)         /doku.php?id=$1&$args        last;
      }
      location ~ \.php$ {
        if (!-f $request_filename) {
          return 404;
        }
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param REDIRECT_STATUS 200;
        fastcgi_pass  localhost:9000;
      }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: "0"
  name: wiki
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wiki
  template:
    metadata:
      labels:
        app: wiki
    spec:
      volumes:
        - {name: config-volume, configMap: {name: wiki}}
        - {name: src-volume,    hostPath:  {path: /usr/src,        type: Directory}}
#       - {name: dfs-volume,    hostPath:  {path: ${HOME}/mnt/dfs, type: Directory}}
#       - {name: tmp-volume,    hostPath:  {path: ${HOME}/tmp,     type: Directory}}
      containers:
        - name: phpfpm
          image: container.0/0.phpfpmext:${context}
          imagePullPolicy: IfNotPresent
          ports:
            - {protocol: TCP, containerPort: 9000}
          volumeMounts:
            - {name: src-volume,    subPath: com.github/splitbrain/dokuwiki,                     mountPath: /usr/share/nginx/html}
            - {name: src-volume,    subPath: com.github/Chris--S/dokuwiki-plugin-iframe,         mountPath: /usr/share/nginx/html/lib/plugins/iframe}
            - {name: src-volume,    subPath: com.github/Chris--S/dokuwiki-plugin-xbr,            mountPath: /usr/share/nginx/html/lib/plugins/xbr}
            - {name: src-volume,    subPath: com.github/lejmr/dokuwiki-plugin-drawio,            mountPath: /usr/share/nginx/html/lib/plugins/drawio}
            - {name: src-volume,    subPath: com.github/selfthinker/dokuwiki_plugin_wrap,        mountPath: /usr/share/nginx/html/lib/plugins/wrap}
            - {name: src-volume,    subPath: com.github/splitbrain/dokuwiki-plugin-translation,  mountPath: /usr/share/nginx/html/lib/plugins/translation}
            - {name: src-volume,    subPath: com.github/hanche/dokuwiki_color_plugin,            mountPath: /usr/share/nginx/html/lib/plugins/color}
            - {name: src-volume,    subPath: com.github/samuelet/indexmenu,                      mountPath: /usr/share/nginx/html/lib/plugins/indexmenu}
            - {name: src-volume,    subPath: com.github/giterlizzi/dokuwiki-template-bootstrap3, mountPath: /usr/share/nginx/html/lib/tpl/bootstrap3}
#           - {name: dfs-volume,                                                                 mountPath: /usr/share/nginx/html/data/pages}
#           - {name: dfs-volume,                                                                 mountPath: /usr/share/nginx/html/data/media}
#           - {name: tmp-volume,                                                                 mountPath: /usr/share/nginx/html/data/pages/tmp}
#           - {name: tmp-volume,                                                                 mountPath: /usr/share/nginx/html/data/media/tmp}
          command: [/bin/sh, -c]
          args:
            - |
              find /usr/share/nginx/html -type d -print0 | xargs -0 chmod 777
              find /usr/share/nginx/html -type f -print0 | xargs -0 chmod 666
              php-fpm
        - name: nginx
          image: nginx:alpine
          imagePullPolicy: IfNotPresent
          ports:
            - {protocol: TCP, containerPort: 80}
          volumeMounts:
            - {name: config-volume,                                                              mountPath: /etc/nginx/conf.d,                             readOnly: true}
            - {name: src-volume,    subPath: com.github/splitbrain/dokuwiki,                     mountPath: /usr/share/nginx/html,                         readOnly: true}
            - {name: src-volume,    subPath: com.github/giterlizzi/dokuwiki-template-bootstrap3, mountPath: /usr/share/nginx/html/lib/tpl/bootstrap3,      readOnly: true}

---
apiVersion: v1
kind: Service
metadata:
  namespace: "0"
  name: wiki
spec:
  type: LoadBalancer
  selector:
    app: wiki
  ports:
    - {protocol: TCP, port: 80}

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: "0"
  name: wiki
spec:
  rules:
    - host: wiki.0
      http: &domain
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: wiki
                port:
                  number: 80
    - host: wiki.${domain}
      http: *domain
